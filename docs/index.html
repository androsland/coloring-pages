<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coloring Page Maker</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --ink: #1f2937;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --line: #e5e7eb;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    text-align: center;
    padding: 48px 16px 24px;
  }
  header h1 {
    margin: 0;
    font-size: 1.75rem;
    font-weight: 650;
    letter-spacing: -0.02em;
  }
  header p { margin: 8px 0 0; color: var(--muted); font-size: 1rem; }
  main { max-width: 960px; margin: 0 auto; padding: 0 20px 40px; }

  .drop {
    display: block;
    border: 2px dashed #cbd5e1;
    border-radius: var(--radius);
    background: var(--card);
    padding: 44px 20px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .drop:hover { border-color: var(--accent); background: #f8faff; }
  .drop.over { background: #eff4ff; border-color: var(--accent); }
  .drop .primary { font-size: 1.05rem; font-weight: 550; }
  .drop strong { color: var(--accent); font-weight: 650; }
  .drop .hint { color: var(--muted); font-size: 0.875rem; margin-top: 8px; }
  .drop input { display: none; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 20px 32px;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 22px;
    margin: 20px 0;
  }
  .controls label {
    font-size: 0.8rem;
    font-weight: 550;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .controls .row {
    flex-direction: row;
    align-items: center;
    gap: 8px;
    color: var(--ink);
    font-size: 0.9rem;
    font-weight: 500;
  }
  select {
    font: inherit;
    font-size: 0.9rem;
    color: var(--ink);
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }
  .controls label .lbl {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .val {
    font-variant-numeric: tabular-nums;
    font-weight: 650;
    color: var(--accent);
    background: #eff4ff;
    border-radius: 6px;
    padding: 1px 7px;
    font-size: 0.8rem;
    min-width: 2.4em;
    text-align: center;
  }
  input[type="range"] { accent-color: var(--accent); width: 180px; }
  input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }

  .status {
    text-align: center;
    min-height: 1.4em;
    color: var(--muted);
    font-size: 0.9rem;
    margin: 8px 0 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
  }
  .card canvas {
    width: 100%;
    height: auto;
    border-radius: 8px;
    background: #fff;
    border: 1px solid var(--line);
  }
  .card .name {
    font-size: 0.8rem;
    color: var(--muted);
    margin: 10px 0;
    word-break: break-all;
  }
  .card-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px 12px;
    margin: 10px 0 2px;
  }
  .card-controls select { padding: 5px 8px; font-size: 0.8rem; }
  .card-check {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
  }
  .btn {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font: inherit;
    font-size: 0.875rem;
    font-weight: 550;
    cursor: pointer;
    transition: background 0.15s;
  }
  .card .btn { margin: 0 3px; }
  .btn:hover { background: var(--accent-hover); }
  .btn.secondary {
    background: #fff;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn.secondary:hover { background: #eff4ff; }
  .btn:disabled { opacity: 0.45; cursor: default; }
  .btn.secondary:disabled:hover { background: #fff; }
  .actions { display: flex; justify-content: center; gap: 12px; margin: 8px 0 24px; }
  footer {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<header>
  <h1>Coloring Page Maker</h1>
  <p>Turn any picture into a printable outline for kids to color.</p>
</header>

<main>
  <label class="drop" id="drop">
    <input type="file" id="file" accept="image/*" multiple />
    <div class="primary"><strong>Click to upload</strong> or drag images here</div>
    <div class="hint">PNG, JPG, or WEBP &middot; multiple files supported</div>
  </label>

  <div class="controls">
    <label>
      <span class="lbl">Detail (fewer to more lines) <output id="sensitivityVal" class="val">5</output></span>
      <input type="range" id="sensitivity" min="1" max="20" value="5" />
    </label>
    <label class="row">
      <input type="checkbox" id="thumb" checked />
      Show color guide in corner
    </label>
    <label>
      <span class="lbl">Guide size <output id="thumbScaleVal" class="val">25%</output></span>
      <input type="range" id="thumbScale" min="10" max="40" value="25" />
    </label>
    <label>
      Paper size
      <select id="paper">
        <option value="A4">A4</option>
        <option value="letter">Letter</option>
      </select>
    </label>
    <label>
      Print size
      <select id="printSize">
        <option value="100">Full page</option>
        <option value="80">Large</option>
        <option value="55">Medium</option>
        <option value="35">Small</option>
      </select>
    </label>
  </div>

  <div class="status" id="status">Loading the image engine…</div>
  <div class="actions">
    <button class="btn" id="printAll" disabled>Print all</button>
    <button class="btn secondary" id="downloadAll" disabled>Download all</button>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>Runs entirely in your browser. Your images never leave your device.</footer>

<script>
// ---- OpenCV.js readiness ------------------------------------------------
let cvReady = false;
const statusEl = document.getElementById('status');
function onOpenCvReady() {
  cv['onRuntimeInitialized'] = () => {
    cvReady = true;
    statusEl.textContent = 'Ready! Drop in some pictures.';
  };
}

// ---- State --------------------------------------------------------------
const results = []; // { name, canvas }
const grid = document.getElementById('grid');

// ---- Controls -----------------------------------------------------------
const el = (id) => document.getElementById(id);
const sensEl = el('sensitivity');
const thumbEl = el('thumb'), thumbScaleEl = el('thumbScale');
const sensValEl = el('sensitivityVal'), thumbScaleValEl = el('thumbScaleVal');

// Live value readouts for the range sliders, updated as you drag.
const syncSensVal = () => { sensValEl.textContent = sensEl.value; };
const syncThumbVal = () => { thumbScaleValEl.textContent = thumbScaleEl.value + '%'; };
sensEl.addEventListener('input', syncSensVal);
thumbScaleEl.addEventListener('input', syncThumbVal);
syncSensVal(); syncThumbVal();

// Style and despeckle are per-image (each card carries its own). The remaining
// controls here are global and apply to every page, so they re-run everything.
const originals = []; // { name, img, style, despeckle }
[sensEl, thumbEl, thumbScaleEl].forEach((c) =>
  c.addEventListener('change', rerunAll)
);

// ---- File intake --------------------------------------------------------
const drop = el('drop'), fileInput = el('file');
fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
['dragenter', 'dragover'].forEach((ev) =>
  drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add('over'); })
);
['dragleave', 'drop'].forEach((ev) =>
  drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove('over'); })
);
drop.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));

async function handleFiles(fileList) {
  if (!cvReady) { statusEl.textContent = 'Still loading the engine — try again in a moment.'; return; }
  const files = [...fileList].filter((f) => f.type.startsWith('image/'));
  if (!files.length) return;
  for (const f of files) {
    const img = await loadImage(f);
    // Per-image suggestion: pick a style from the picture itself. Lineart art
    // is noisy without speck removal, so enable despeckle when we pick it.
    const style = suggestStyle(img);
    originals.push({ name: stem(f.name), img, style, despeckle: style === 'lineart' });
  }
  rerunAll();
}

function stem(filename) {
  return filename.replace(/\.[^.]+$/, '');
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

// ---- Style suggestion ---------------------------------------------------
// Guess a good default from the image itself. If it already has black ink
// outlines (lots of dark, low-saturation pixels) over large flat regions,
// it's cartoon/clip art -> "lineart". Otherwise (photos, colored-outline art)
// -> "threshold". Cheap pure-JS pass on a downscaled copy; no OpenCV Mats.
function suggestStyle(img) {
  const MAX = 480;
  const scale = Math.min(1, MAX / Math.max(img.naturalWidth, img.naturalHeight));
  const w = Math.max(1, Math.round(img.naturalWidth * scale));
  const h = Math.max(1, Math.round(img.naturalHeight * scale));
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);   // flatten transparency
  ctx.drawImage(img, 0, 0, w, h);
  const d = ctx.getImageData(0, 0, w, h).data;
  const lum = new Float32Array(w * h);
  let inkCount = 0;
  for (let i = 0, p = 0; i < d.length; i += 4, p++) {
    const r = d[i], g = d[i + 1], b = d[i + 2];
    const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
    const v = mx, s = mx === 0 ? 0 : (mx - mn) / mx * 255;  // HSV V and S
    if (v < LINEART_V_MAX && s < LINEART_S_MAX) inkCount++; // same mask as lineart
    lum[p] = 0.299 * r + 0.587 * g + 0.114 * b;
  }
  // Flatness: fraction of pixels whose right/down neighbors barely differ.
  let flatCount = 0, tot = 0;
  for (let y = 0; y < h - 1; y++) {
    for (let x = 0; x < w - 1; x++) {
      const p = y * w + x;
      if (Math.abs(lum[p] - lum[p + 1]) + Math.abs(lum[p] - lum[p + w]) < 8) flatCount++;
      tot++;
    }
  }
  const ink = inkCount / (w * h);
  const flat = tot ? flatCount / tot : 0;
  return (ink >= 0.012 && flat >= 0.55) ? 'lineart' : 'threshold';
}

// ---- Core conversion (mirrors coloringify.py) ---------------------------
// lineart ink thresholds — mirror the Python defaults (HSV: H 0-179, S/V 0-255).
const LINEART_V_MAX = 120, LINEART_S_MAX = 60;
const DESPECKLE_MIN_AREA = 12;

// Remove black blobs smaller than minArea. `bin` is single-channel 8-bit,
// 0=ink, 255=paper. Returns a new Mat the caller must delete. Mirrors
// despeckle() in coloringify.py via connectedComponentsWithStats.
function despeckleMat(bin, minArea) {
  const inkMask = new cv.Mat();
  cv.bitwise_not(bin, inkMask);                 // 255 where ink, 0 where paper
  const labels = new cv.Mat(), stats = new cv.Mat(), centroids = new cv.Mat();
  const n = cv.connectedComponentsWithStats(inkMask, labels, stats, centroids, 8, cv.CV_32S);
  const keep = new Uint8Array(n);               // keep[0] = 0 (background stays paper)
  for (let i = 1; i < n; i++) {
    keep[i] = stats.intAt(i, cv.CC_STAT_AREA) >= minArea ? 1 : 0;
  }
  const out = new cv.Mat(bin.rows, bin.cols, cv.CV_8UC1);
  const lab = labels.data32S, res = out.data;
  for (let p = 0; p < lab.length; p++) res[p] = keep[lab[p]] ? 0 : 255;
  inkMask.delete(); labels.delete(); stats.delete(); centroids.delete();
  return out;
}

function makeColoringPage(img, style, despeckle) {
  // Flatten any transparency onto white by drawing over a white canvas.
  const src = document.createElement('canvas');
  src.width = img.naturalWidth;
  src.height = img.naturalHeight;
  const sctx = src.getContext('2d');
  sctx.fillStyle = '#ffffff';
  sctx.fillRect(0, 0, src.width, src.height);
  sctx.drawImage(img, 0, 0);

  const mat = cv.imread(src);                 // RGBA
  const gray = new cv.Mat();
  cv.cvtColor(mat, gray, cv.COLOR_RGBA2GRAY);
  let out = new cv.Mat();

  if (style === 'edges') {
    const blur = new cv.Mat();
    cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
    cv.Canny(blur, out, 50, 150);
    cv.bitwise_not(out, out);                 // black lines on white
    blur.delete();
  } else if (style === 'lineart') {
    // Keep dark, low-saturation "ink"; whiten everything else. Saturation is
    // the key signal, so work in HSV from RGB (not the gray image).
    const rgb = new cv.Mat();
    cv.cvtColor(mat, rgb, cv.COLOR_RGBA2RGB);
    const hsv = new cv.Mat();
    cv.cvtColor(rgb, hsv, cv.COLOR_RGB2HSV);
    const channels = new cv.MatVector();
    cv.split(hsv, channels);
    const s = channels.get(1), v = channels.get(2);
    const vMask = new cv.Mat(), sMask = new cv.Mat();
    // THRESH_BINARY_INV sets 255 where src <= thresh; thresh-1 makes it
    // a strict "<" to match (v < v_max) & (s < s_max) in Python.
    cv.threshold(v, vMask, LINEART_V_MAX - 1, 255, cv.THRESH_BINARY_INV);
    cv.threshold(s, sMask, LINEART_S_MAX - 1, 255, cv.THRESH_BINARY_INV);
    const ink = new cv.Mat();
    cv.bitwise_and(vMask, sMask, ink);        // 255 where ink
    cv.bitwise_not(ink, out);                 // black ink on white paper
    rgb.delete(); hsv.delete(); s.delete(); v.delete(); channels.delete();
    vMask.delete(); sMask.delete(); ink.delete();
  } else {
    const blur = new cv.Mat();
    cv.medianBlur(gray, blur, 5);
    const C = parseInt(sensEl.value, 10);     // higher = fewer lines
    cv.adaptiveThreshold(blur, out, 255, cv.ADAPTIVE_THRESH_MEAN_C, cv.THRESH_BINARY, 9, C);
    blur.delete();
  }

  // Optional speck removal on the single-channel outline, before the color
  // guide (which paints onto a BGR promotion of this Mat).
  if (despeckle) {
    const cleaned = despeckleMat(out, DESPECKLE_MIN_AREA);
    out.delete();
    out = cleaned;
  }

  // Render the outline to an output canvas.
  const outCanvas = document.createElement('canvas');
  cv.imshow(outCanvas, out);

  // Color-reference thumbnail, top-right corner.
  if (thumbEl.checked) {
    const ctx = outCanvas.getContext('2d');
    const W = outCanvas.width, H = outCanvas.height;
    const margin = Math.round(W * 0.015) + 6;
    const scale = parseInt(thumbScaleEl.value, 10) / 100;
    let tw = Math.max(1, Math.round(W * scale));
    let th = Math.max(1, Math.round(tw * src.height / src.width));
    if (th > H - 2 * margin) { th = H - 2 * margin; tw = Math.round(th * src.width / src.height); }
    const x = W - margin - tw, y = margin;
    ctx.drawImage(src, x, y, tw, th);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = Math.max(2, Math.round(W * 0.003));
    ctx.strokeRect(x, y, tw, th);
  }

  mat.delete(); gray.delete(); out.delete();
  return outCanvas;
}

// ---- Render -------------------------------------------------------------
function rerunAll() {
  if (!cvReady || !originals.length) return;
  // Remember scroll position: rebuilding the grid must not yank the page to top.
  const scrollY = window.scrollY;
  results.length = 0;
  statusEl.textContent = 'Drawing…';
  // Defer so the status paints before the (synchronous) heavy work.
  setTimeout(() => {
    // Build into a fragment and swap in one shot, so the old grid keeps its
    // height until the new cards are ready (no layout collapse, no scroll jump).
    const frag = document.createDocumentFragment();
    originals.forEach((o, i) => {
      const canvas = makeColoringPage(o.img, o.style, o.despeckle);
      results.push({ name: o.name, canvas });
      frag.appendChild(makeCard(i, canvas));
    });
    grid.replaceChildren(frag);
    const empty = results.length === 0;
    el('downloadAll').disabled = empty;
    el('printAll').disabled = empty;
    statusEl.textContent = `${results.length} page(s) ready. Each page has its own style below — tweak any of them.`;
    window.scrollTo(0, scrollY);
  }, 20);
}

// Friendly labels for the per-card style dropdown.
const STYLE_LABELS = { threshold: 'Bold', edges: 'Thin', lineart: 'Cartoon' };

// Re-render a single card in place when its style/despeckle changes — keeps the
// other cards (and the scroll position) untouched.
function rerenderCard(i) {
  const scrollY = window.scrollY;
  const o = originals[i];
  const canvas = makeColoringPage(o.img, o.style, o.despeckle);
  results[i] = { name: o.name, canvas };
  grid.replaceChild(makeCard(i, canvas), grid.children[i]);
  window.scrollTo(0, scrollY);
}

function makeCard(i, canvas) {
  const o = originals[i];
  const card = document.createElement('div');
  card.className = 'card';
  card.appendChild(canvas);

  // Per-image controls: style dropdown + speck removal, preset from detection.
  const ctrls = document.createElement('div');
  ctrls.className = 'card-controls';

  const sel = document.createElement('select');
  for (const v of ['threshold', 'edges', 'lineart']) {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = STYLE_LABELS[v];
    sel.appendChild(opt);
  }
  sel.value = o.style;
  sel.setAttribute('aria-label', 'Style for ' + o.name);
  sel.addEventListener('change', () => { o.style = sel.value; rerenderCard(i); });
  ctrls.appendChild(sel);

  const dsLabel = document.createElement('label');
  dsLabel.className = 'card-check';
  const ds = document.createElement('input');
  ds.type = 'checkbox';
  ds.checked = o.despeckle;
  ds.setAttribute('aria-label', 'Remove specks for ' + o.name);
  ds.addEventListener('change', () => { o.despeckle = ds.checked; rerenderCard(i); });
  dsLabel.appendChild(ds);
  dsLabel.appendChild(document.createTextNode(' Remove specks'));
  ctrls.appendChild(dsLabel);
  card.appendChild(ctrls);

  const label = document.createElement('div');
  label.className = 'name';
  label.textContent = o.name + '.png';
  card.appendChild(label);
  const pr = document.createElement('button');
  pr.className = 'btn';
  pr.textContent = 'Print';
  pr.setAttribute('aria-label', 'Print ' + o.name);
  pr.onclick = () => printImages([canvas.toDataURL('image/png')]);
  card.appendChild(pr);
  const dl = document.createElement('button');
  dl.className = 'btn secondary';
  dl.textContent = 'Download';
  dl.onclick = () => downloadCanvas(canvas, o.name);
  card.appendChild(dl);
  return card;
}

function downloadCanvas(canvas, name) {
  canvas.toBlob((blob) => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name + '.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, 'image/png');
}

el('downloadAll').onclick = () => {
  results.forEach((r, i) => setTimeout(() => downloadCanvas(r.canvas, r.name), i * 250));
};

// ---- Printing -----------------------------------------------------------
// Render the chosen pages into a hidden iframe sized to the selected paper,
// then trigger the browser's print dialog. Each page gets its own sheet.
function printImages(dataUrls) {
  if (!dataUrls.length) return;
  const paper = el('paper').value;               // 'A4' | 'letter'
  const pct = parseInt(el('printSize').value, 10); // % of the printable area
  const pages = dataUrls.map((u) =>
    `<div class="page"><img src="${u}"></div>`
  ).join('');

  const returnFocus = document.activeElement;  // restore after the dialog closes
  const iframe = document.createElement('iframe');
  iframe.setAttribute('aria-hidden', 'true');
  iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
  document.body.appendChild(iframe);
  const doc = iframe.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><style>
    @page { size: ${paper}; margin: 10mm; }
    html, body { margin: 0; padding: 0; }
    .page {
      height: 96vh;
      display: flex;
      align-items: center;
      justify-content: center;
      break-after: page;
      page-break-after: always;
    }
    .page:last-child { break-after: auto; page-break-after: auto; }
    img { max-width: ${pct}%; max-height: ${pct}%; }
  </style></head><body>${pages}</body></html>`);
  doc.close();

  // Wait for all images to decode before printing, else blank sheets.
  const imgs = [...doc.images];
  let pending = imgs.length;
  const go = () => {
    iframe.contentWindow.focus();
    iframe.contentWindow.print();
    setTimeout(() => {
      iframe.remove();
      if (returnFocus && returnFocus.focus) returnFocus.focus();
    }, 1000);
  };
  if (!pending) return go();
  imgs.forEach((im) => {
    if (im.complete) { if (--pending === 0) go(); }
    else im.onload = im.onerror = () => { if (--pending === 0) go(); };
  });
}

el('printAll').onclick = () =>
  printImages(results.map((r) => r.canvas.toDataURL('image/png')));
</script>
<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()"></script>
</body>
</html>
