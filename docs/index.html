<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Coloring Page Maker</title>
<style>
  :root {
    --bg: #f6f7f9;
    --card: #ffffff;
    --ink: #1f2937;
    --muted: #6b7280;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --line: #e5e7eb;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
      Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  header {
    text-align: center;
    padding: 48px 16px 24px;
  }
  header h1 {
    margin: 0;
    font-size: 1.75rem;
    font-weight: 650;
    letter-spacing: -0.02em;
  }
  header p { margin: 8px 0 0; color: var(--muted); font-size: 1rem; }
  main { max-width: 960px; margin: 0 auto; padding: 0 20px 40px; }

  .drop {
    display: block;
    border: 2px dashed #cbd5e1;
    border-radius: var(--radius);
    background: var(--card);
    padding: 44px 20px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .drop:hover { border-color: var(--accent); background: #f8faff; }
  .drop.over { background: #eff4ff; border-color: var(--accent); }
  .drop .primary { font-size: 1.05rem; font-weight: 550; }
  .drop strong { color: var(--accent); font-weight: 650; }
  .drop .hint { color: var(--muted); font-size: 0.875rem; margin-top: 8px; }
  .drop input { display: none; }

  select {
    font: inherit;
    font-size: 0.9rem;
    color: var(--ink);
    padding: 7px 10px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: #fff;
  }
  .val {
    font-variant-numeric: tabular-nums;
    font-weight: 650;
    color: var(--accent);
    background: #eff4ff;
    border-radius: 6px;
    padding: 1px 7px;
    font-size: 0.8rem;
    min-width: 2.4em;
    text-align: center;
  }
  input[type="range"] { accent-color: var(--accent); width: 180px; }
  input[type="checkbox"] { accent-color: var(--accent); width: 16px; height: 16px; }

  .status {
    text-align: center;
    min-height: 1.4em;
    color: var(--muted);
    font-size: 0.9rem;
    margin: 8px 0 16px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    text-align: center;
  }
  .card canvas {
    width: 100%;
    height: auto;
    border-radius: 8px;
    background: #fff;
    border: 1px solid var(--line);
    cursor: zoom-in;
  }
  .card canvas:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Actual-size viewer */
  .lightbox {
    position: fixed;
    inset: 0;
    z-index: 50;
    background: rgba(15, 23, 42, 0.88);
    overflow: auto;
    padding: 56px 24px 24px;
  }
  .lightbox[hidden] { display: none; }
  .lightbox-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    background: rgba(15, 23, 42, 0.6);
    color: #fff;
  }
  .lightbox-caption { font-size: 0.85rem; font-variant-numeric: tabular-nums; }
  .lightbox-close {
    background: none;
    border: none;
    color: #fff;
    font-size: 1.8rem;
    line-height: 1;
    cursor: pointer;
    padding: 0 6px;
  }
  .lightbox-stage { display: flex; min-height: 100%; }
  .lightbox-stage img {
    margin: auto;            /* center when smaller than the viewport */
    background: #fff;
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
    cursor: zoom-out;
  }
  .card .name {
    font-size: 0.8rem;
    color: var(--muted);
    margin: 10px 0;
    word-break: break-all;
  }
  .card-controls {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px 12px;
    margin: 10px 0 2px;
  }
  .card-controls select { padding: 5px 8px; font-size: 0.8rem; }
  .card-check {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
  }
  .card-detail {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 2px 0;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
  }
  .card-detail input[type="range"] { width: 110px; }
  .card-mini {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78rem;
    font-weight: 500;
    color: var(--muted);
  }
  .card-mini select { padding: 4px 6px; font-size: 0.78rem; }
  .btn {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    text-decoration: none;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font: inherit;
    font-size: 0.875rem;
    font-weight: 550;
    cursor: pointer;
    transition: background 0.15s;
  }
  .card .btn { margin: 0 3px; }
  .btn:hover { background: var(--accent-hover); }
  .btn.secondary {
    background: #fff;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn.secondary:hover { background: #eff4ff; }
  .btn:disabled { opacity: 0.45; cursor: default; }
  .btn.secondary:disabled:hover { background: #fff; }
  .actions { display: flex; justify-content: center; gap: 12px; margin: 8px 0 24px; }
  footer {
    text-align: center;
    padding: 32px 16px;
    color: var(--muted);
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<header>
  <h1>Coloring Page Maker</h1>
  <p>Turn any picture into a printable outline for kids to color.</p>
</header>

<main>
  <label class="drop" id="drop">
    <input type="file" id="file" accept="image/*" multiple />
    <div class="primary"><strong>Click to upload</strong> or drag images here</div>
    <div class="hint">PNG, JPG, or WEBP &middot; multiple files supported</div>
  </label>

  <div class="status" id="status">Loading the image engine…</div>
  <div class="actions">
    <button class="btn" id="printAll" disabled>Print all</button>
    <button class="btn secondary" id="downloadAll" disabled>Download all</button>
  </div>
  <div class="grid" id="grid"></div>
</main>

<footer>Runs entirely in your browser. Your images never leave your device.</footer>

<!-- Actual-size viewer: click any page to inspect it at full resolution. -->
<div class="lightbox" id="lightbox" hidden role="dialog" aria-modal="true" aria-label="Page at actual size">
  <div class="lightbox-bar">
    <span class="lightbox-caption" id="lightboxCaption"></span>
    <button class="lightbox-close" id="lightboxClose" aria-label="Close viewer">&times;</button>
  </div>
  <div class="lightbox-stage" id="lightboxStage"></div>
</div>

<script>
// ---- OpenCV.js readiness ------------------------------------------------
let cvReady = false;
const statusEl = document.getElementById('status');
function onOpenCvReady() {
  cv['onRuntimeInitialized'] = () => {
    cvReady = true;
    statusEl.textContent = 'Ready! Drop in some pictures.';
  };
}

// ---- State --------------------------------------------------------------
const results = []; // { name, canvas }
const grid = document.getElementById('grid');

// ---- Controls -----------------------------------------------------------
const el = (id) => document.getElementById(id);

// Every setting is per-image — each card carries its own. There are no global
// controls; defaults below seed a freshly uploaded picture.
const DEFAULT_DETAIL = 5, DEFAULT_THUMB_SCALE = 25;
let pendingNote = '';   // one-shot status suffix (e.g. "skipped 2 files")
const originals = [];
// { name, img, style, despeckle, detail, thumb, thumbScale }

// ---- File intake --------------------------------------------------------
const drop = el('drop'), fileInput = el('file');
fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
['dragenter', 'dragover'].forEach((ev) =>
  drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.add('over'); })
);
['dragleave', 'drop'].forEach((ev) =>
  drop.addEventListener(ev, (e) => { e.preventDefault(); drop.classList.remove('over'); })
);
drop.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));

async function handleFiles(fileList) {
  if (!cvReady) { statusEl.textContent = 'Still loading the engine — try again in a moment.'; return; }
  const all = [...fileList];
  const imageFiles = all.filter((f) => f.type.startsWith('image/'));
  let skipped = all.length - imageFiles.length;   // non-image files dropped
  if (!imageFiles.length) {
    statusEl.textContent = all.length
      ? "Those aren't images I can read — try PNG, JPG, or WEBP."
      : '';
    return;
  }
  statusEl.textContent = 'Reading images…';
  let added = 0;
  for (const f of imageFiles) {
    // Isolate each file: a corrupt or unsupported image must not abort the batch.
    let img;
    try { img = await loadImage(f); }
    catch { skipped++; continue; }
    if (!img.naturalWidth || !img.naturalHeight) { skipped++; continue; }
    // Default to Bold (threshold): robust across photos and cartoons alike. The
    // per-card dropdown switches to Cartoon/Thin when you want a different look.
    originals.push({
      name: stem(f.name), img, style: 'threshold',
      despeckle: false, detail: DEFAULT_DETAIL,
      thumb: true, thumbScale: DEFAULT_THUMB_SCALE,
    });
    added++;
  }
  if (!added) {
    statusEl.textContent = "Couldn't read those images — they may be corrupt or an unsupported format.";
    return;
  }
  pendingNote = skipped ? `skipped ${skipped} file${skipped > 1 ? 's' : ''} (couldn't read)` : '';
  rerunAll();
}

function stem(filename) {
  return filename.replace(/\.[^.]+$/, '');
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };       // decoded; URL no longer needed
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('decode failed')); };
    img.src = url;
  });
}

// ---- Core conversion (mirrors coloringify.py) ---------------------------
// lineart ink thresholds — mirror the Python defaults (HSV: H 0-179, S/V 0-255).
const LINEART_V_MAX = 120, LINEART_S_MAX = 60;
const DESPECKLE_MIN_AREA = 12;

// Remove black blobs smaller than minArea. `bin` is single-channel 8-bit,
// 0=ink, 255=paper. Returns a new Mat the caller must delete. Mirrors
// despeckle() in coloringify.py via connectedComponentsWithStats.
function despeckleMat(bin, minArea) {
  const inkMask = new cv.Mat();
  cv.bitwise_not(bin, inkMask);                 // 255 where ink, 0 where paper
  const labels = new cv.Mat(), stats = new cv.Mat(), centroids = new cv.Mat();
  const n = cv.connectedComponentsWithStats(inkMask, labels, stats, centroids, 8, cv.CV_32S);
  const keep = new Uint8Array(n);               // keep[0] = 0 (background stays paper)
  for (let i = 1; i < n; i++) {
    keep[i] = stats.intAt(i, cv.CC_STAT_AREA) >= minArea ? 1 : 0;
  }
  const out = new cv.Mat(bin.rows, bin.cols, cv.CV_8UC1);
  const lab = labels.data32S, res = out.data;
  for (let p = 0; p < lab.length; p++) res[p] = keep[lab[p]] ? 0 : 255;
  inkMask.delete(); labels.delete(); stats.delete(); centroids.delete();
  return out;
}

function makeColoringPage(o) {
  const { img, style, despeckle, detail } = o;
  // Flatten any transparency onto white by drawing over a white canvas.
  const src = document.createElement('canvas');
  src.width = img.naturalWidth;
  src.height = img.naturalHeight;
  const sctx = src.getContext('2d');
  sctx.fillStyle = '#ffffff';
  sctx.fillRect(0, 0, src.width, src.height);
  sctx.drawImage(img, 0, 0);

  const mat = cv.imread(src);                 // RGBA
  const gray = new cv.Mat();
  cv.cvtColor(mat, gray, cv.COLOR_RGBA2GRAY);
  let out = new cv.Mat();

  if (style === 'edges') {
    const blur = new cv.Mat();
    cv.GaussianBlur(gray, blur, new cv.Size(5, 5), 0);
    cv.Canny(blur, out, 50, 150);
    cv.bitwise_not(out, out);                 // black lines on white
    blur.delete();
  } else if (style === 'lineart') {
    // Keep dark, low-saturation "ink"; whiten everything else. Saturation is
    // the key signal, so work in HSV from RGB (not the gray image).
    const rgb = new cv.Mat();
    cv.cvtColor(mat, rgb, cv.COLOR_RGBA2RGB);
    const hsv = new cv.Mat();
    cv.cvtColor(rgb, hsv, cv.COLOR_RGB2HSV);
    const channels = new cv.MatVector();
    cv.split(hsv, channels);
    const s = channels.get(1), v = channels.get(2);
    const vMask = new cv.Mat(), sMask = new cv.Mat();
    // THRESH_BINARY_INV sets 255 where src <= thresh; thresh-1 makes it
    // a strict "<" to match (v < v_max) & (s < s_max) in Python.
    cv.threshold(v, vMask, LINEART_V_MAX - 1, 255, cv.THRESH_BINARY_INV);
    cv.threshold(s, sMask, LINEART_S_MAX - 1, 255, cv.THRESH_BINARY_INV);
    const ink = new cv.Mat();
    cv.bitwise_and(vMask, sMask, ink);        // 255 where ink
    cv.bitwise_not(ink, out);                 // black ink on white paper
    rgb.delete(); hsv.delete(); s.delete(); v.delete(); channels.delete();
    vMask.delete(); sMask.delete(); ink.delete();
  } else {
    const blur = new cv.Mat();
    cv.medianBlur(gray, blur, 5);
    const C = detail;                         // higher = fewer lines
    cv.adaptiveThreshold(blur, out, 255, cv.ADAPTIVE_THRESH_MEAN_C, cv.THRESH_BINARY, 9, C);
    blur.delete();
  }

  // Optional speck removal on the single-channel outline, before the color
  // guide (which paints onto a BGR promotion of this Mat).
  if (despeckle) {
    const cleaned = despeckleMat(out, DESPECKLE_MIN_AREA);
    out.delete();
    out = cleaned;
  }

  // Render the outline to an output canvas.
  const outCanvas = document.createElement('canvas');
  cv.imshow(outCanvas, out);

  // Color-reference thumbnail, top-right corner.
  if (o.thumb) {
    const ctx = outCanvas.getContext('2d');
    const W = outCanvas.width, H = outCanvas.height;
    const margin = Math.round(W * 0.015) + 6;
    const scale = o.thumbScale / 100;
    let tw = Math.max(1, Math.round(W * scale));
    let th = Math.max(1, Math.round(tw * src.height / src.width));
    if (th > H - 2 * margin) { th = H - 2 * margin; tw = Math.round(th * src.width / src.height); }
    const x = W - margin - tw, y = margin;
    ctx.drawImage(src, x, y, tw, th);
    ctx.strokeStyle = '#000';
    ctx.lineWidth = Math.max(2, Math.round(W * 0.003));
    ctx.strokeRect(x, y, tw, th);
  }

  mat.delete(); gray.delete(); out.delete();
  return outCanvas;
}

// ---- Render -------------------------------------------------------------
function rerunAll() {
  if (!cvReady || !originals.length) return;
  // Remember scroll position: rebuilding the grid must not yank the page to top.
  const scrollY = window.scrollY;
  results.length = 0;
  statusEl.textContent = 'Drawing…';
  // Defer so the status paints before the (synchronous) heavy work.
  setTimeout(() => {
    // Build into a fragment and swap in one shot, so the old grid keeps its
    // height until the new cards are ready (no layout collapse, no scroll jump).
    const frag = document.createDocumentFragment();
    originals.forEach((o, i) => {
      const canvas = makeColoringPage(o);
      results.push({ name: o.name, canvas });
      frag.appendChild(makeCard(i, canvas));
    });
    grid.replaceChildren(frag);
    const empty = results.length === 0;
    el('downloadAll').disabled = empty;
    el('printAll').disabled = empty;
    statusEl.textContent = `${results.length} page(s) ready. Every page has its own settings below — tweak any of them.`
      + (pendingNote ? ` · ${pendingNote}` : '');
    pendingNote = '';
    window.scrollTo(0, scrollY);
  }, 20);
}

// Friendly labels for the per-card style dropdown.
const STYLE_LABELS = { threshold: 'Bold', edges: 'Thin', lineart: 'Cartoon' };

// Re-render a single card in place when its style/despeckle changes — keeps the
// other cards (and the scroll position) untouched.
function rerenderCard(i) {
  const scrollY = window.scrollY;
  const o = originals[i];
  const canvas = makeColoringPage(o);
  results[i] = { name: o.name, canvas };
  grid.replaceChild(makeCard(i, canvas), grid.children[i]);
  window.scrollTo(0, scrollY);
}

// A checkbox + text label. onChange(checked) fires on toggle.
function mkCheck(text, checked, aria, onChange) {
  const label = document.createElement('label');
  label.className = 'card-check';
  const box = document.createElement('input');
  box.type = 'checkbox';
  box.checked = checked;
  box.setAttribute('aria-label', aria);
  box.addEventListener('change', () => onChange(box.checked));
  label.appendChild(box);
  label.appendChild(document.createTextNode(' ' + text));
  return label;
}

// A labelled range with a live value badge. onInput(value) updates state while
// dragging; onCommit() fires on release (use it to re-render).
function mkSlider(text, min, max, value, suffix, aria, onInput, onCommit) {
  const row = document.createElement('label');
  row.className = 'card-detail';
  const span = document.createElement('span');
  span.textContent = text;
  const range = document.createElement('input');
  range.type = 'range'; range.min = min; range.max = max; range.value = value;
  range.setAttribute('aria-label', aria);
  const val = document.createElement('output');
  val.className = 'val';
  val.textContent = value + suffix;
  range.addEventListener('input', () => { val.textContent = range.value + suffix; onInput(parseInt(range.value, 10)); });
  range.addEventListener('change', onCommit);
  row.append(span, range, val);
  return row;
}

// A labelled dropdown. options is [value, text] pairs. onChange(value) fires.
function mkSelect(text, options, value, aria, onChange) {
  const wrap = document.createElement('label');
  wrap.className = 'card-mini';
  const span = document.createElement('span');
  span.textContent = text;
  const sel = document.createElement('select');
  for (const [v, txt] of options) {
    const opt = document.createElement('option');
    opt.value = v; opt.textContent = txt;
    sel.appendChild(opt);
  }
  sel.value = value;
  sel.setAttribute('aria-label', aria);
  sel.addEventListener('change', () => onChange(sel.value));
  wrap.append(span, sel);
  return wrap;
}

function makeCard(i, canvas) {
  const o = originals[i];
  const card = document.createElement('div');
  card.className = 'card';
  // The on-card canvas is scaled to fit; clicking opens it at actual size.
  canvas.setAttribute('role', 'button');
  canvas.setAttribute('tabindex', '0');
  canvas.setAttribute('aria-label', 'View ' + o.name + ' at actual size');
  canvas.title = 'Click to view actual size';
  canvas.addEventListener('click', () => openLightbox(canvas, o.name));
  canvas.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openLightbox(canvas, o.name); }
  });
  card.appendChild(canvas);

  // Row 1: style + speck removal (both change the outline -> re-render).
  const row1 = document.createElement('div');
  row1.className = 'card-controls';
  row1.appendChild(mkSelect('', Object.entries(STYLE_LABELS), o.style,
    'Style for ' + o.name, (v) => { o.style = v; rerenderCard(i); }));
  row1.appendChild(mkCheck('Remove specks', o.despeckle, 'Remove specks for ' + o.name,
    (c) => { o.despeckle = c; rerenderCard(i); }));
  card.appendChild(row1);

  // Detail only affects the Bold (threshold) path, so show it only there.
  if (o.style === 'threshold') {
    card.appendChild(mkSlider('Detail', 1, 20, o.detail, '', 'Detail (fewer to more lines) for ' + o.name,
      (v) => { o.detail = v; }, () => rerenderCard(i)));
  }

  // Row 2: color guide on/off, plus its size when on (both re-render).
  const row2 = document.createElement('div');
  row2.className = 'card-controls';
  row2.appendChild(mkCheck('Color guide', o.thumb, 'Show color guide for ' + o.name,
    (c) => { o.thumb = c; rerenderCard(i); }));
  card.appendChild(row2);
  if (o.thumb) {
    card.appendChild(mkSlider('Guide size', 10, 40, o.thumbScale, '%', 'Color guide size for ' + o.name,
      (v) => { o.thumbScale = v; }, () => rerenderCard(i)));
  }

  const label = document.createElement('div');
  label.className = 'name';
  label.textContent = o.name + '.png';
  card.appendChild(label);
  const pr = document.createElement('button');
  pr.className = 'btn';
  pr.textContent = 'Print';
  pr.setAttribute('aria-label', 'Print ' + o.name);
  pr.onclick = () => printImages([canvas.toDataURL('image/png')]);
  card.appendChild(pr);
  const dl = document.createElement('button');
  dl.className = 'btn secondary';
  dl.textContent = 'Download';
  dl.onclick = () => downloadCanvas(canvas, o.name);
  card.appendChild(dl);
  return card;
}

function downloadCanvas(canvas, name) {
  canvas.toBlob((blob) => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name + '.png';
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 1000);
  }, 'image/png');
}

el('downloadAll').onclick = () => {
  results.forEach((r, i) => setTimeout(() => downloadCanvas(r.canvas, r.name), i * 250));
};

// ---- Actual-size viewer -------------------------------------------------
// Click a page to see it at 1:1 pixels (the on-card preview is scaled down, so
// this is where you check fine line detail). Dismiss via the image, backdrop,
// the close button, or Escape.
const lightbox = el('lightbox'), lightboxStage = el('lightboxStage'), lightboxCaption = el('lightboxCaption');
let lightboxReturnFocus = null;

function openLightbox(canvas, name) {
  const img = new Image();
  img.src = canvas.toDataURL('image/png');
  img.alt = name + ' at actual size';
  img.addEventListener('click', closeLightbox);
  lightboxStage.replaceChildren(img);
  lightboxCaption.textContent = `${name}.png · ${canvas.width} × ${canvas.height} px`;
  lightboxReturnFocus = document.activeElement;
  lightbox.hidden = false;
  el('lightboxClose').focus();
}
function closeLightbox() {
  if (lightbox.hidden) return;
  lightbox.hidden = true;
  lightboxStage.replaceChildren();
  if (lightboxReturnFocus && lightboxReturnFocus.focus) lightboxReturnFocus.focus();
}
el('lightboxClose').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) closeLightbox(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

// ---- Printing -----------------------------------------------------------
// Render the chosen pages into a hidden iframe, one per sheet, then trigger the
// print dialog. Paper size and scaling are left to the browser's print preview.
function printImages(dataUrls) {
  if (!dataUrls.length) return;
  const pages = dataUrls.map((u) => `<div class="page"><img src="${u}"></div>`).join('');

  const returnFocus = document.activeElement;  // restore after the dialog closes
  const iframe = document.createElement('iframe');
  iframe.setAttribute('aria-hidden', 'true');
  iframe.style.cssText = 'position:fixed;right:0;bottom:0;width:0;height:0;border:0;';
  document.body.appendChild(iframe);
  const doc = iframe.contentWindow.document;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><style>
    @page { margin: 10mm; }
    html, body { margin: 0; padding: 0; }
    .page {
      height: 96vh;
      display: flex;
      align-items: center;
      justify-content: center;
      break-after: page;
      page-break-after: always;
    }
    .page:last-child { break-after: auto; page-break-after: auto; }
    img { max-width: 100%; max-height: 100%; }
  </style></head><body>${pages}</body></html>`);
  doc.close();

  // Wait for all images to decode before printing, else blank sheets.
  const imgs = [...doc.images];
  let pending = imgs.length;
  const go = () => {
    iframe.contentWindow.focus();
    iframe.contentWindow.print();
    setTimeout(() => {
      iframe.remove();
      if (returnFocus && returnFocus.focus) returnFocus.focus();
    }, 1000);
  };
  if (!pending) return go();
  imgs.forEach((im) => {
    if (im.complete) { if (--pending === 0) go(); }
    else im.onload = im.onerror = () => { if (--pending === 0) go(); };
  });
}

el('printAll').onclick = () =>
  printImages(results.map((r) => r.canvas.toDataURL('image/png')));
</script>
<script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()"></script>
</body>
